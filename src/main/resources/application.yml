server:
  port: 8081

spring:
  application:
    name: ter-resource-server
  security:
    oauth2:
      resourceserver:
        jwt:
          # Use issuer-uri so Spring Boot auto-discovers the JWKS URL via OpenID Connect Discovery
          # and also validates the `iss` claim. Keycloak must be running before Spring Boot starts.
          issuer-uri: http://localhost:8080/realms/ter-realm

logging:
  level:
    org.springframework.security: DEBUG
    com.example.resourceserver: DEBUG

# Working-hours window for /api/medical/contextual
access:
  window:
    start: "08:00"
    end: "18:00"
