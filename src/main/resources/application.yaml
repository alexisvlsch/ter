server:
  port: 8081

spring:
  application:
    name: ter-resource-server
  security:
    oauth2:
      resourceserver:
        jwt:
          # jwk-set-uri : Keycloak n'est contacté qu'à la première requête JWT (lazy)
          # issuer-uri  : Keycloak est contacté au démarrage (échoue si Keycloak absent)
          jwk-set-uri: http://localhost:8080/realms/ter-realm/protocol/openid-connect/certs

logging:
  level:
    org.springframework.security: DEBUG